name: Rust

on:
  push:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    
  linter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4  
    - name: Linter
      run: cargo clippy -- -D warnings  

  tests:  
    runs-on: ubuntu-latest
    steps:  
    - uses: actions/checkout@v4
    - name: Run tests
      run: cargo test --verbose
